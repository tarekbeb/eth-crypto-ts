name: CI
on:
  pull_request:
    branches:
      - master
jobs:
  build-audit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        run: echo "branch=$(echo ${GITHUB_HEAD_REF#refs/heads/})" >>$GITHUB_OUTPUT

      - name: Checkout ${{ steps.branch_name.outputs.branch }}
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch_name.outputs.branch }}

      - name: Setup Up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm install

      - name: Run Audit-CI to check for vulnerabilities
        id: audit
        if: always()
        run: npm run audit-ci

      - name: Run linter
        run: npm run lint --no-color --max-warnings=0

      - name: Run tests
        if: always()
        run: npm run test

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: tarekbeb/eth-crypto-ts
