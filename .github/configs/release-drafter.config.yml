name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '💥 Breaking Changes'
    labels:
      - 'breaking-change'
  - title: '🚀 Features'
    labels:
      - 'enhancement'
      - 'feature'
      - 'improvement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
      - 'bugfix'
      - 'fix'
      - 'hotfix'
  - title: '🔒 Security'
    labels:
      - 'security'
  - title: '⚡ Performance'
    labels:
      - 'perf'
      - 'performance'
  - title: '🧰 Maintenance'
    labels:
      - 'chore'
      - 'ci'
      - 'refactor'
      - 'build'
      - 'style'
  - title: '📖 Documentation'
    labels:
      - 'docs'
      - 'documentation'
  - title: '🧪 Tests'
    labels:
      - 'test'
      - 'tests'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

sort-by: merged_at
sort-direction: descending

# ---------------------------------------------------------------------------
# Autolabeler
#
# Applies labels to PRs based on:
#   - `title`   — the PR title
#   - `commits` — any commit message inside the PR
#   - `body`    — the PR description
#
# Conventional-commit rules used for version bump detection:
#   MAJOR  → any type with `!` suffix, or body contains "BREAKING CHANGE"
#   MINOR  → feat / feature
#   PATCH  → fix, hotfix, chore, ci, docs, refactor, security, perf, style, test
# ---------------------------------------------------------------------------
autolabeler:
  # --- BREAKING CHANGE (major bump) ---
  # Matches:  feat!: …  |  fix(scope)!: …  |  BREAKING CHANGE: … in body
  - label: 'breaking-change'
    title:
      - '/^(feat|fix|refactor|perf|chore|build|ci|docs|style|test|hotfix|sec|security)(\(.+\))?!:/i'
    body:
      - '/BREAKING[-\s]CHANGE/i'
    commits:
      - '/^(feat|fix|refactor|perf|chore|build|ci|docs|style|test)(\(.+\))?!:/im'
      - '/BREAKING[-\s]CHANGE/im'

  # --- Features (minor bump) ---
  - label: 'feature'
    title:
      - '/^feat(\(.+\))?!?:/i'
    commits:
      - '/^feat(\(.+\))?!?:/im'

  # --- Bug fixes (patch bump) ---
  - label: 'fix'
    title:
      - '/^fix(\(.+\))?!?:/i'
    commits:
      - '/^fix(\(.+\))?!?:/im'

  - label: 'hotfix'
    title:
      - '/^hotfix(\(.+\))?!?:/i'
    commits:
      - '/^hotfix(\(.+\))?!?:/im'

  # --- Maintenance (patch bump) ---
  - label: 'chore'
    title:
      - '/^(chore|build)(\(.+\))?!?:/i'
    commits:
      - '/^(chore|build)(\(.+\))?!?:/im'

  - label: 'ci'
    title:
      - '/^ci(\(.+\))?!?:/i'
    commits:
      - '/^ci(\(.+\))?!?:/im'

  - label: 'refactor'
    title:
      - '/^refactor(\(.+\))?!?:/i'
    commits:
      - '/^refactor(\(.+\))?!?:/im'

  - label: 'style'
    title:
      - '/^style(\(.+\))?!?:/i'
    commits:
      - '/^style(\(.+\))?!?:/im'

  # --- Documentation (patch bump) ---
  - label: 'docs'
    title:
      - '/^docs(\(.+\))?!?:/i'
    commits:
      - '/^docs(\(.+\))?!?:/im'

  # --- Performance (patch bump) ---
  - label: 'perf'
    title:
      - '/^perf(\(.+\))?!?:/i'
    commits:
      - '/^perf(\(.+\))?!?:/im'

  # --- Tests (patch bump) ---
  - label: 'test'
    title:
      - '/^(test|tests)(\(.+\))?!?:/i'
    commits:
      - '/^(test|tests)(\(.+\))?!?:/im'

  # --- Security (patch bump) ---
  - label: 'security'
    title:
      - '/^(sec|security)(\(.+\))?!?:/i'
    commits:
      - '/^(sec|security)(\(.+\))?!?:/im'

  # --- Skip merge/bot commits ---
  - label: 'skip-changelog'
    title:
      - '/^(Auto-merge|Merge (branch|pull request))/i'

exclude-labels:
  - 'skip-changelog'

# ---------------------------------------------------------------------------
# Version resolver
#
# Determines the next semver bump from the highest-priority label found on
# any merged PR since the last release tag.
#
#   breaking-change → MAJOR
#   feature         → MINOR
#   everything else → PATCH  (default: patch as a safety net)
# ---------------------------------------------------------------------------
version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking-change'
  minor:
    labels:
      - 'minor'
      - 'enhancement'
      - 'feature'
      - 'improvement'
  patch:
    labels:
      - 'patch'
      - 'bug'
      - 'bugfix'
      - 'fix'
      - 'hotfix'
      - 'chore'
      - 'ci'
      - 'docs'
      - 'refactor'
      - 'security'
      - 'perf'
      - 'style'
      - 'test'
  default: patch

commitish: master
filter-by-commitish: true

header: |
  ## eth-crypto-ts v$RESOLVED_VERSION

no-changes-template: |
  _No significant changes since last release._

template: |
  $CHANGES

  ---

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
